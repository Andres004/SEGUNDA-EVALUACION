<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova Clase</title>
    <link rel="stylesheet" href="dist/css/main.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">NOVTECH</div>
            <button id="btn-menu" class="btn-menu">MENU</button>
            <nav id="nav-menu" class="nav-menu">
                <ul>
                    <li><a href="#hero">Inicio</a></li>
                    <li><a href="#servicios">Servicios</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero" class="hero">
            <div class="hero-content">
                <h1>Hacemos cosas digitales</h1>
                <p>Webs, diseños y marketing para tu tarea o negocio.</p>
                <a href="#servicios" class="btn-primary">Ver lista</a>
            </div>
        </section>

        <section id="servicios" class="seccion-servicios">
            <h2>Lista de Servicios</h2>
            
            <div class="filtros" id="contenedor-filtros">
                <button class="btn-filtro activo" data-cat="Todos">Todos</button>
                <button class="btn-filtro" data-cat="Programacion">Programacion</button>
                <button class="btn-filtro" data-cat="Graficos">Graficos</button>
                <button class="btn-filtro" data-cat="Redes">Redes</button>
            </div>

            <div id="grid-servicios" class="grid-servicios">
            </div>
        </section>

        <section id="contacto" class="seccion-contacto">
            <div class="contacto-wrapper">
                <h2>Enviar mensaje</h2>
                <form id="formulario-contacto" novalidate>
                    <div class="campo">
                        <label for="nombre">Tu nombre completo:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre Aqui">
                    </div>
                    
                    <div class="campo">
                        <label for="correo">Tu correo:</label>
                        <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com">
                    </div>
                    
                    <div class="campo">
                        <label for="tipo-servicio">Que necesitas:</label>
                        <select id="tipo-servicio" name="tipo-servicio">
                            <option value="">Elegir...</option>
                            <option value="Programacion">Web</option>
                            <option value="Graficos">Diseño</option>
                            <option value="Redes">Marketing</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="mensaje">Detalles:</label>
                        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje..."></textarea>
                    </div>

                    <div id="mensaje-feedback" class="feedback-oculto"></div>

                    <button type="submit" class="btn-primary">Enviar </button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>SEguna evaluacion Esteban Medrano  y Andres Andrade 2026.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
